  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    // Cloudflare JS-Detections injects a hidden probe iframe read on
    // DOMContentLoaded; our documentElement swap detaches it, so its callback
    // throws on iframe.contentWindow.document. Benign third-party noise — hide
    // it from the overlay (still logged). Scoped away from our blob: bundle.
    var __m = String(e.message || '');
    if (!/^blob:/.test(e.filename || '') &&
        /contentWindow|contentDocument|reading '(?:document|contentWindow)'/.test(__m)) {
      console.warn('[bundle] suppressed Cloudflare JS-detections beacon error:', __m);
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"5aad096c-fa13-4710-a151-8fe83f840999\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <title>Terraviz — Design Preview<\u002Ftitle>\n  <style>/* ============================================================\n   Terraviz — Color tokens\n   Source of truth: terraviz/tokens/global.json + STYLE_GUIDE.md\n   A dark, globe-first palette. Near-black page; translucent\n   white surfaces; a single sky-blue accent. Everything reads\n   on top of a 3D globe, so surfaces are alpha-on-dark, never\n   opaque fills.\n   ============================================================ */\n\n:root {\n  /* --- Brand accent (sky blue) --- */\n  --color-accent:        #4da6ff; /* links, active states, focus rings */\n  --color-accent-hover:  #6ab8ff; /* accent hover */\n  --color-accent-dark:   #0066cc; /* primary action buttons */\n  --color-accent-darker: #0052a3; /* primary button hover */\n\n  /* --- Background --- */\n  --color-bg: #0d0d12; /* page / globe letterbox */\n\n  /* --- Surfaces (translucent white on dark) --- */\n  --color-surface:               rgba(255, 255, 255, 0.06); /* panel / element bg */\n  --color-surface-alt:           rgba(255, 255, 255, 0.04); /* cards */\n  --color-surface-hover:         rgba(255, 255, 255, 0.12); /* surface hover */\n  --color-surface-active:        rgba(255, 255, 255, 0.15); /* pressed */\n  --color-surface-border:        rgba(255, 255, 255, 0.10); /* default border */\n  --color-surface-border-subtle: rgba(255, 255, 255, 0.08); /* glass-panel border */\n\n  /* --- Text (5-step dim ramp, all AA on dark glass) --- */\n  --color-text:           #e8eaf0; /* titles, headings */\n  --color-text-secondary: #bbbbbb; /* body, labels */\n  --color-text-muted:     #999999; /* metadata, timestamps (≥4.5:1) */\n  --color-text-dim:       #888888; /* counts, status (≥4.5:1) */\n  --color-text-faint:     #666666; /* decorative / disabled only — never body */\n\n  /* --- Semantic state --- */\n  --color-success:      #22c55e;\n  --color-success-soft: #6dc96d;\n  --color-error:        #ef4444;\n  --color-error-soft:   #ff6b6b;\n  --color-warning:      #ffcc66;\n\n  /* --- Facet hues (catalog grouping: chips, graph nodes, timeline) --- */\n  --facet-color-category-content:      #5cc8c8; /* teal — category & content */\n  --facet-color-format-medium:         #c486f7; /* violet — format & medium */\n  --facet-color-time:                  #f59f4a; /* amber — time ranges */\n  --facet-color-quality-availability:  #6dc96d; /* green — quality & availability */\n\n  /* --- Glass material --- */\n  --glass-bg:       rgba(13, 13, 18, 0.92); /* frosted panel — dark */\n  --glass-bg-light: rgba(13, 13, 18, 0.88); /* frosted panel — lighter */\n  --glass-blur:     blur(12px); /* @kind other */ /* backdrop-filter radius */\n\n  /* --- Accent alpha ramp (glows, focus halos, tag fills) --- */\n  --accent-o05: rgba(77, 166, 255, 0.05);\n  --accent-o08: rgba(77, 166, 255, 0.08);\n  --accent-o12: rgba(77, 166, 255, 0.12);\n  --accent-o15: rgba(77, 166, 255, 0.15);\n  --accent-o18: rgba(77, 166, 255, 0.18);\n  --accent-o20: rgba(77, 166, 255, 0.20);\n  --accent-o25: rgba(77, 166, 255, 0.25);\n  --accent-o30: rgba(77, 166, 255, 0.30);\n  --accent-o35: rgba(77, 166, 255, 0.35);\n  --accent-o40: rgba(77, 166, 255, 0.40);\n  --accent-o50: rgba(77, 166, 255, 0.50);\n  --accent-o70: rgba(77, 166, 255, 0.70);\n\n  /* --- White alpha ramp (surfaces, borders, dividers) --- */\n  --white-o05: rgba(255, 255, 255, 0.05);\n  --white-o08: rgba(255, 255, 255, 0.08);\n  --white-o10: rgba(255, 255, 255, 0.10);\n  --white-o12: rgba(255, 255, 255, 0.12);\n  --white-o15: rgba(255, 255, 255, 0.15);\n  --white-o20: rgba(255, 255, 255, 0.20);\n  --white-o30: rgba(255, 255, 255, 0.30);\n  --white-o50: rgba(255, 255, 255, 0.50);\n  --white-o70: rgba(255, 255, 255, 0.70);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Terraviz — Typography tokens\n   System font stack only — no webfonts. The globe is the hero;\n   type is quiet UI chrome that loads instantly on every device.\n   Titles are light-weight, wide-tracked, UPPERCASE. Tabular\n   numerals everywhere coordinates and time appear.\n   ============================================================ */\n\n:root {\n  /* --- Families --- */\n  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* --- Type scale (rem; UI runs small — globe-first) --- */\n  --text-2xs: 0.6rem;   /* keyword tags, section eyebrows */\n  --text-xs:  0.65rem;  /* metadata, counts */\n  --text-sm:  0.7rem;   /* labels, chips */\n  --text-base:0.75rem;  /* body / menu items */\n  --text-md:  0.8rem;   /* panel body, card titles */\n  --text-lg:  0.875rem; /* search input, primary buttons */\n  --text-xl:  1rem;     /* panel headings */\n  --text-2xl: 1.4rem;   /* browse / app wordmark */\n  --text-3xl: 2rem;     /* loading title */\n\n  /* --- Weights --- */\n  --weight-light:    300; /* display titles */\n  --weight-regular:  400;\n  --weight-medium:   500; /* labels, transport */\n  --weight-semibold: 600; /* card titles, section titles */\n  --weight-bold:     700;\n\n  /* --- Line heights --- */\n  --leading-tight:  1.3;\n  --leading-snug:   1.4;\n  --leading-normal: 1.55;\n\n  /* --- Letter-spacing --- */\n  --tracking-tight:  0.02em;\n  --tracking-normal: 0.03em; /* tabular data */\n  --tracking-wide:   0.05em;\n  --tracking-wider:  0.08em; /* section eyebrows */\n  --tracking-widest: 0.15em; /* uppercase display titles */\n\n  /* --- Semantic roles --- */\n  --title-display-weight: var(--weight-light);\n  --title-display-tracking: var(--tracking-widest);\n  --title-display-transform: uppercase; /* @kind other */\n  --eyebrow-weight: var(--weight-semibold);\n  --eyebrow-tracking: var(--trac \"var(--color-accent)\" stroke-opacity=\"0.6\" stroke-width=\"1.7\" transform=\"rotate(-24 20 20)\"><\u002Fellipse><circle cx=\"20\" cy=\"20\" r=\"6.6\" fill=\"var(--color-accent)\"><\u002Fcircle><circle cx=\"17.6\" cy=\"17.4\" r=\"2.3\" fill=\"#fff\" fill-opacity=\"0.55\"><\u002Fcircle><circle cx=\"33.2\" cy=\"13.6\" r=\"2.2\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n                  <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:.74rem;color:var(--color-text);font-weight:600\">Take the guided tour<\u002Fspan><span style=\"display:block;font-size:.64rem;color:var(--color-text-dim);margin-top:1px\">Orbit walks you through the interface<\u002Fspan><\u002Fspan>\n                  <span style=\"flex:none;color:var(--color-accent);font-size:.8rem\">▶︎<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"display:flex;flex-direction:column;gap:8px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-accent)\">Getting started<\u002Fdiv>\n                  <sc-for list=\"{{ helpStart }}\" as=\"h\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;flex-direction:column;gap:2px\">\n                      <div style=\"display:flex;gap:.55rem;align-items:center\">\n                        <span style=\"font-size:.95rem;flex:none;width:1.4rem;text-align:center;line-height:1;color:var(--color-accent)\">{{ h.icon }}<\u002Fspan>\n                        <div style=\"font-size:.74rem;color:var(--color-text-secondary);font-weight:600\">{{ h.title }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.5;margin-left:1.95rem\">{{ h.body }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim)\">Keyboard shortcuts<\u002Fdiv>\n                  <sc-for list=\"{{ helpKeys }}\" as=\"k\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                      <span style=\"font-size:.68rem;color:var(--color-text-secondary)\">{{ k.label }}<\u002Fspan>\n                      <span style=\"font-family:var(--font-mono);font-size:.62rem;color:var(--color-text-muted);background:var(--white-o05);border:1px solid var(--white-o12);border-radius:4px;padding:2px 7px\">{{ k.key }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:6px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim)\">More<\u002Fdiv>\n                  <sc-for list=\"{{ helpLinks }}\" as=\"l\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:2px 0\"><span style=\"font-size:.7rem;color:var(--color-text-secondary)\">{{ l.label }}<\u002Fspan><span style=\"font-size:.7rem;color:var(--color-accent)\">›<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                  <div style=\"font-size:.58rem;color:var(--color-text-faint);line-height:1.5;margin-top:4px\">Terraviz · data © NOAA Science On a Sphere. Free and open, no account required.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ showFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ feedbackSent }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 10px;text-align:center\">\n                  <div style=\"width:44px;height:44px;border-radius:50%;background:var(--accent-o15);border:1px solid var(--accent-o40);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--color-accent)\">✓︎<\u002Fdiv>\n                  <div style=\"font-size:.82rem;color:var(--color-text);font-weight:600\">Thanks for the feedback<\u002Fdiv>\n                  <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.5;max-width:13.75rem\">We read every note. It helps us decide which datasets and features to build next.<\u002Fdiv>\n                  <button sc-camel-on-click=\"{{ onFeedbackReset }}\" style=\"{{ feedbackResetStyle }}\">Send another<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ feedbackForm }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;flex-direction:column;gap:11px\">\n                  <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.5\">Found a bug, want a dataset, or have an idea? Tell us — it goes straight to the team.<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:6px\">\n                    <span style=\"font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-dim)\">Type<\u002Fspan>\n                    <div style=\"display:flex;gap:5px\">\n                      <sc-for list=\"{{ feedbackKinds }}\" as=\"fk\" hint-placeholder-count=\"3\">\n                        <button sc-camel-on-click=\"{{ fk.onClick }}\" style=\"{{ fk.style }}\">{{ fk.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:6px\">\n                    <span style=\"font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-dim)\">Message<\u002Fspan>\n                    <textarea value=\"{{ feedbackText }}\" sc-camel-on-input=\"{{ onFeedbackInput }}\" placeholder=\"What's on your mind?\" style=\"{{ feedbackTextareaStyle }}\"><\u002Ftextarea>\n                  <\u002Fdiv>\n                  <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer\">\n                    <button sc-camel-on-click=\"{{ onToggleAttach }}\" role=\"switch\" aria-label=\"Attach current view\" style=\"{{ attachSwitchStyle }}\"><span style=\"{{ attachKnobStyle }}\"><\u002Fspan><\u002Fbutton>\n                    <span style=\"font-size:.68rem;color:var(--color-text-secondary)\">Attach current globe view &amp; dataset<\u002Fspan>\n                  <\u002Flabel>\n                  <x-import component-from-global-scope=\"TerravizDesignSystem_fa540d.Button\" variant=\"primary\" size=\"sm\" sc-camel-on-click=\"{{ onSendFeedback }}\" hint-size=\"100%,32px\">Send feedback<\u002Fx-import>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- date/time picker (wireframe 3b) -->\n      <sc-if value=\"{{ datePickerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ datePickerStyle }}\">\n          <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-accent)\">Date &amp; time<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <button sc-camel-on-click=\"{{ onDatePrevYear }}\" aria-label=\"Previous year\" style=\"{{ dpNavStyle }}\">◀︎<\u002Fbutton>\n            <span style=\"font-family:var(--font-mono);font-size:.8rem;color:var(--color-text);letter-spacing:.03em\">{{ dateText }}<\u002Fspan>\n            <button sc-camel-on-click=\"{{ onDateNextYear }}\" aria-label=\"Next year\" style=\"{{ dpNavStyle }}\">▶︎<\u002Fbutton>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"{{ dateMax }}\" value=\"{{ dateIdxVal }}\" sc-camel-on-input=\"{{ onDateSlider }}\" style=\"width:100%;accent-color:var(--color-accent)\">\n          <div style=\"display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.54rem;color:var(--color-text-faint)\"><span>{{ dateFirst }}<\u002Fspan><span>{{ dateLast }}<\u002Fspan><\u002Fdiv>\n          <div style=\"height:1px;background:var(--white-o08)\"><\u002Fdiv>\n          <div style=\"display:flex;gap:6px;align-items:center\">\n            <span style=\"font-size:.62rem;color:var(--color-text-dim);width:2.4rem;flex:none\">Date<\u002Fspan>\n            <input type=\"date\" value=\"{{ isoDateVal }}\" min=\"{{ isoMin }}\" max=\"{{ isoMax }}\" sc-camel-on-input=\"{{ onDatePick }}\" style=\"{{ dpInputStyle }}\">\n          <\u002Fdiv>\n          <sc-if value=\"{{ showTimeInput }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:6px;align-items:center\">\n              <span style=\"font-size:.62rem;color:var(--color-text-dim);width:2.4rem;flex:none\">Time<\u002Fspan>\n              <input type=\"time\" value=\"{{ isoTimeVal }}\" step=\"3600\" sc-camel-on-input=\"{{ onTimePick }}\" style=\"{{ dpInputStyle }}\">\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:5px\">\n            <button sc-camel-on-click=\"{{ onDateStart }}\" style=\"{{ dpChip }}\">Start<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onDateNow }}\" style=\"{{ dpChip }}\">Now<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onDateEnd }}\" style=\"{{ dpChip }}\">End<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- view popover -->\n      <sc-if value=\"{{ viewOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ viewPopStyle }}\">\n          <div style=\"font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-accent)\">Layout<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:5px\">\n            <sc-for list=\"{{ stops }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ st.onClick }}\" style=\"{{ st.chipStyle }}\">{{ st.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:var(--white-o08)\"><\u002Fdiv>\n          <div style=\"font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim)\">View<\u002Fdiv>\n          <sc-for list=\"{{ toggles }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.rowStyle }}\">\n              <span style=\"{{ t.boxStyle }}\">{{ t.check }}<\u002Fspan>\n              <span style=\"font-size:.74rem;color:var(--color-text-secondary)\">{{ t.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"height:1px;background:var(--white-o08)\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onOpenSettings }}\" style=\"display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:transparent;border:none;cursor:pointer;padding:2px 0;font-family:inherit\">\n            <span style=\"font-size:.8rem;color:var(--color-text-muted)\">⚙︎<\u002Fspan>\n            <span style=\"font-size:.74rem;color:var(--color-text-secondary)\">Settings…<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Settings dialog -->\n      <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div sc-camel-on-click=\"{{ onCloseSettings }}\" style=\"position:absolute;inset:0;background:rgba(0,0,0,.68);z-index:14\"><\u002Fdiv>\n        <div style=\"{{ settingsDialogStyle }}\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:13px 14px 10px;border-bottom:1px solid var(--white-o08);flex:none\">\n            <sc-if value=\"{{ settingsInSub }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ onSettingsBack }}\" aria-label=\"Back to settings\" style=\"background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:.9rem;padding:0 4px 0 0;line-height:1\">‹<\u002Fbutton>\n            <\u002Fsc-if>\n            <div style=\"font-weight:300;letter-spacing:.14em;font-size:.82rem;flex:1\">{{ settingsTitle }}<\u002Fdiv>\n            <x-import component-from-global-scope=\"TerravizDesignSystem_fa540d.IconButton\" variant=\"header\" label=\"Close settings\" sc-camel-on-click=\"{{ onCloseSettings }}\" hint-size=\"24px,24px\">✕︎<\u002Fx-import>\n          <\u002Fdiv>\n          <div class=\"tvx-scroll\" style=\"flex:1;min-height:0;overflow-y:auto;padding:12px 14px 16px;display:flex;flex-direction:column;gap:14px\">\n\n            <sc-if value=\"{{ settingsMain }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ settingsSections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:{{ sec.color }}\">{{ sec.title }}<\u002Fdiv>\n                <sc-for list=\"{{ sec.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div sc-camel-on-click=\"{{ r.onRow }}\" style=\"{{ r.rowStyle }}\">\n                    <div style=\"display:flex;flex-direction:column;gap:1px;flex:1;min-width:0\">\n                      <span style=\"font-size:.74rem;color:var(--color-text-secondary)\">{{ r.label }}<\u002Fspan>\n                      <sc-if value=\"{{ r.hasHint }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:.58rem;color:var(--color-text-dim);line-height:1.35\">{{ r.hint }}<\u002Fspan><\u002Fsc-if>\n                    <\u002Fdiv>\n                    <!-- toggle -->\n                    <sc-if value=\"{{ r.isToggle }}\" hint-placeholder-val=\"{{ false }}\">\n                      <button sc-camel-on-click=\"{{ r.onToggle e=\"font-size:.74rem;color:{{ r.labelColor }}\">{{ r.label }}<\u002Fspan>\n                        <sc-if value=\"{{ r.hasHint }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:.58rem;color:var(--color-text-dim);line-height:1.35\">{{ r.hint }}<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                      <sc-if value=\"{{ r.isToggle }}\" hint-placeholder-val=\"{{ false }}\">\n                        <button sc-camel-on-click=\"{{ r.onToggle }}\" role=\"switch\" aria-label=\"{{ r.label }}\" style=\"{{ r.switchStyle }}\"><span style=\"{{ r.knobStyle }}\"><\u002Fspan><\u002Fbutton>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ r.isSelect }}\" hint-placeholder-val=\"{{ false }}\">\n                        <button sc-camel-on-click=\"{{ r.onCycle }}\" style=\"display:flex;align-items:center;gap:6px;background:var(--color-surface);border:1px solid var(--white-o12);border-radius:6px;padding:4px 9px;cursor:pointer;font-family:inherit;font-size:.7rem;color:var(--color-text-secondary);flex:none;white-space:nowrap\">{{ r.value }} <span style=\"color:var(--color-text-dim)\">▾<\u002Fspan><\u002Fbutton>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ r.isAction }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"font-size:.7rem;color:{{ r.actionColor }}\">›<\u002Fspan>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ settingsNode }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.55;background:var(--white-o05);border:1px solid var(--white-o08);border-radius:8px;padding:9px 11px\">These features are set by the <strong style=\"color:var(--color-text-secondary);font-weight:600\">node operator<\u002Fstrong> w ntrated along the U.S. West and interior — a live layer that refreshes through the season.',\n        body: ['The Active Fires layer streams thermal-anomaly detections from polar-orbiting satellites, updating within a few hours of each overpass.', 'It is the near-real-time companion to the archived fire records — use it to watch this season\\u2019s activity concentrate along the western ranges.'],\n        cat: 'Land', tags: ['wildfire', 'real-time', 'land'] },\n    ].filter(e => e.kind === 'event' ? _f.events !== false : e.kind === 'blog' ? _f.blog !== false : true);\n  }\n  buildTimelineMarkers() {\n    const { tlMin, tlMax } = this.state, span = tlMax - tlMin;\n    return this.tlEvents().map(e => {\n      if (e.year < tlMin || e.year > tlMax) return null;\n      if (!this.storyMatchItem(e)) return null;\n      const left = ((e.year - tlMin) / span) * 100;\n      const col = e.kind === 'event' ? 'var(--facet-color-time)' : 'var(--color-accent)';\n      const sel = this.state.tlMarkerId === e.id;\n      return { title: e.title, onClick: () => this.selectMarker(e.id),\n        style: 'position:absolute;left:' + left + '%;top:9px;transform:translate(-50%,-50%);background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:' + (sel ? '.8rem' : '.66rem') + ';line-height:1;color:' + col + ';padding:3px;' + (sel ? 'text-shadow:0 0 8px ' + col : '') };\n    }).filter(Boolean);\n  }\n  tlAxisTicks() {\n    const { tlMin, tlMax } = this.state;\n    return [{ year: tlMin }, { year: Math.round((tlMin + tlMax) / 2) }, { year: tlMax }];\n  }\n  buildMapStories() {\n    const s = [\n      { id: 'ozone', ev: 'ev-ozone', x: 30, y: 42, w: 18, h: 15, col: 'var(--facet-color-time)', title: 'Upper Midwest · Ozone story' },\n      { id: 'sst', ev: 'bl-elnino', x: 60, y: 60, w: 20, h: 12, col: '#5cc8c8', title: 'Eastern Pacific · Warm pool' },\n    ];\n    return s.map(m => { const on = this.state.mapStoryId === m.id; return { title: m.title, onClick: () => this.selectS
